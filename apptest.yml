app:
  name: "Wikipedia"
  package: "org.wikipedia"
  platform: android

source:
  root: "app/src/main/java/org/wikipedia"
  layouts_dir: "app/src/main/res/layout"
  strings_file: "app/src/main/res/values/strings.xml"
  manifest: "app/src/main/AndroidManifest.xml"

build:
  repo_url: "https://github.com/wikimedia/apps-android-wikipedia.git"
  variant: "alphaDebug"
  test_package: "org.wikipedia.alpha"

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  grounding:
    provider: moonshot
    model: kimi-k2.5

