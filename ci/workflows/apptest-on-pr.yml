name: AppTest Analysis
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  apptest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apptest
        run: pip install git+https://github.com/XitingXie/pr2tests.git

      - name: Create apptest config
        run: |
          cat > apptest.yml <<'EOF'
          app:
            name: "Wikipedia"
            package: "org.wikipedia"
            platform: android

          source:
            root: "app/src/main/java/org/wikipedia"
            layouts_dir: "app/src/main/res/layout"
            strings_file: "app/src/main/res/values/strings.xml"
            manifest: "app/src/main/AndroidManifest.xml"

          llm:
            provider: anthropic
            model: claude-sonnet-4-20250514
          EOF

      - name: Run apptest analyze
        run: |
          apptest analyze \
            --diff "origin/main...HEAD" \
            --repo . \
            --config apptest.yml \
            --output .apptest

      - name: Post results to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f .apptest/analysis.json ]; then
            echo "No analysis output found"
            exit 0
          fi

          python3 <<'PYEOF'
          import json

          with open(".apptest/analysis.json") as f:
              data = json.load(f)

          lines = [
              "## AppTest Analysis",
              "",
              f"**{data['total_changed_files']}** files changed",
              "",
              "| Category | Count |",
              "|----------|-------|",
              f"| UI changes | {len(data['ui_changes'])} |",
              f"| Logic changes | {len(data['logic_changes'])} |",
              f"| Test changes | {len(data['test_changes'])} |",
              f"| Infra changes | {len(data['infra_changes'])} |",
              "",
          ]

          if data["logic_changes"]:
              lines.append("### Logic Changes")
              lines.append("")
              for lc in data["logic_changes"]:
                  nature = lc.get("change_nature", "unknown")
                  screens = lc.get("affected_screens", [])
                  screen_names = ", ".join(s.rsplit("/", 1)[-1] for s in screens) if screens else "none traced"
                  lines.append(f"- **{lc['file']}** ({lc['type']}, {nature}) → {screen_names}")
              lines.append("")

          if data["ui_changes"]:
              lines.append("### UI Changes")
              lines.append("")
              for uc in data["ui_changes"]:
                  screens = uc.get("affected_screens", [])
                  screen_names = ", ".join(s.rsplit("/", 1)[-1] for s in screens) if screens else "none"
                  lines.append(f"- **{uc['file']}** → {screen_names}")
              lines.append("")

          lines.append("---")
          lines.append("*Generated by [AppTest](https://github.com/XitingXie/pr2tests)*")

          with open("/tmp/comment.md", "w") as f:
              f.write("\n".join(lines))
          PYEOF

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
